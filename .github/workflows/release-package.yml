name: Bump Version and Publish to npm

on:
  repository_dispatch:
    types: [release]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bump-and-publish-github:
    runs-on: self-hosted

    permissions:
      packages: write
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Create lib
        run: npm run ci

      - name: Checkout, bun, commit and push version change
        run: |
          git config user.name "konstruct-bot"
          git config user.email "konstruct-bot@konstruct.io"
          git fetch origin main
          git checkout main
          npm version ${{ github.event.client_payload.version }} --no-commit-hooks --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "🔖 release: bump version to ${{ github.event.client_payload.version }}" --allow-empty --no-verify
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Authenticate with GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_TOKEN }}" > ~/.npmrc

      # Publish as `latest` so the newest version is always latest, regardless of
      # its prerelease tag.
      - name: Publish to GitHub Packages
        run: npm publish --registry https://npm.pkg.github.com/ --tag latest

      - name: Upload built package
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  # npm Trusted Publishing (OIDC) does not support self-hosted runners yet, so the
  # npm publish runs on a GitHub-hosted runner. No npm token is used: the npm CLI
  # exchanges the GitHub OIDC token (id-token: write) for a short-lived publish token.
  publish-npm:
    needs: bump-and-publish-github
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      # Do NOT set registry-url here: it writes `_authToken=${NODE_AUTH_TOKEN}` into
      # .npmrc, and an empty token disables OIDC. publishConfig.registry already
      # points npm publish at https://registry.npmjs.org/.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Download built package
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      # ignore-scripts=true means no build/prepare runs during publish, so the
      # downloaded dist is exactly what gets published. Do not set NODE_AUTH_TOKEN.
      # --provenance forces the OIDC/id-token path: if id-token: write is missing it
      # fails with an explicit error instead of a misleading ENEEDAUTH.
      # Publish as `latest` so the newest version is always latest, regardless of its
      # prerelease tag. npm Trusted Publishing (OIDC) only authenticates `npm publish`,
      # not `dist-tag`/`deprecate`/etc, so a secondary dist-tag cannot be set here.
      - name: Publish to npm (OIDC)
        run: npm publish --provenance --tag latest

  notify-slack:
    needs: [bump-and-publish-github, publish-npm]
    runs-on: self-hosted

    steps:
      - name: Send new version of the package to Konstruct Slack
        run: |
          curl --location 'https://n8n-production.mgmt-24.konstruct.io/webhook/konstruct-ui/updates' \
          --header 'Content-Type: application/json' \
          --data '{
            "package_name": "${{ github.event.repository.name }}",
            "version": "${{ github.event.client_payload.version }}",
            "url": "${{ github.event.client_payload.url }}",
            "repository": "${{ github.event.repository.html_url }}",
            "storybook": "https://konstructio.github.io/konstruct-ui"
          }'
