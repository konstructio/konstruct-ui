name: Bump Version and Publish to npm

on:
  workflow_run:
    workflows: ['Update Changelog']
    types:
      - completed

jobs:
  bump-version-and-publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Create lib
        run: npm run ci

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-info

      - name: Read artifact with release version
        run: |
          RELEASE_VERSION=$(cat release-version.txt)
          echo "Release Version: $RELEASE_VERSION"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      - name: Read artifact with url
        run: |
          URL=$(cat url.txt)
          echo "URL: $URL"
          echo "URL=$URL" >> $GITHUB_ENV_URL

      - name: Checkout, bun, commit and push version change
        run: |
          git config user.name "konstruct-bot"
          git config user.email "konstruct-bot@konstruct.io"
          git fetch origin main
          git checkout main
          npm version ${RELEASE_VERSION} --no-commit-hooks --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "🔖 release: bump version to ${RELEASE_VERSION}" --allow-empty --no-verify
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.KBOT_TOKEN }}

      - name: Authenticate with GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.KBOT_TOKEN }}" > ~/.npmrc

      - name: Authenticate with npmjs
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> ~/.npmrc

      - name: Publish to GitHub Packages
        run: npm publish --registry https://npm.pkg.github.com/

      - name: Publish to npm
        run: npm publish --registry https://registry.npmjs.org/

      - name: Send new version of the package to Konstruct Slack
        run: |
          curl --location 'https://n8n-production.mgmt-24.konstruct.io/webhook/konstruct-ui/updates' \
          --header 'Content-Type: application/json' \
          --data '{
            "package_name": "${{ github.event.repository.name }}",
            "version": "${RELEASE_VERSION}",
            "url": "${URL}",
            "repository": "${{ github.event.repository.html_url }}",
            "storybook": "https://konstructio.github.io/konstruct-ui"
          }'
